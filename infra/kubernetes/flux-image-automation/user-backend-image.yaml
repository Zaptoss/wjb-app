apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: user-backend
spec:
  image: europe-central2-docker.pkg.dev/int20h-2026/wjb/api-user
  interval: 1m0s
  secretRef:
    name: gar-pull
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: user-backend
spec:
  imageRepositoryRef:
    name: user-backend
  filterTags:
    pattern: '^v?(?P<version>[0-9]+\.[0-9]+\.[0-9]+)$'
    extract: '$version'
  policy:
    semver:
      range: '>=0.0.0'
