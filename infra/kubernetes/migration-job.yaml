apiVersion: batch/v1
kind: Job
metadata:
  name: migration-v0-1-0
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: gar-pull
      containers:
        - name: migration-v0-2-0
          image: europe-central2-docker.pkg.dev/int20h-2026/wjb/migration:v0.2.0
          env:
            - name: ASPNETCORE_URLS
              value: "http://0.0.0.0:8080"
            - name: ConnectionStrings__LocalhostConnection
              valueFrom:
                secretKeyRef:
                  name: wjb-api-secret
                  key: CONNECTION_STRING
