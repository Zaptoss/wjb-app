apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-user
  template:
    metadata:
      labels:
        app: web-user
    spec:
      volumes:
        - name: nginx-conf
          configMap:
            name: web-user
      imagePullSecrets:
        - name: gar-pull
      containers:
        - name: web-user
          image: europe-central2-docker.pkg.dev/int20h-2026/wjb/web-user:v0.2.0 # {"$imagepolicy": "wjb:user-frontend"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          env:
            - name: APP_API_URL
              value: ""
            - name: APP_ENV
              value: "production"
            - name: APP_VERSION
              value: "0.2.0"
            - name: APP_FEATURE_FLAGS
              value: '{"newDashboard":false}'
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
