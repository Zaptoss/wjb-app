post:
  tags:
    - Conditions
  summary: Create a new condition for a specific edge
  parameters:
    - in: path
      name: edgeId
      required: true
      schema:
        $ref: '#/components/schemas/Guid'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Conditions'
  responses:
    '201':
      description: Condition created successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Conditions'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    '404':
      description: Edge not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string

get:
  tags:
    - Conditions
  summary: Retrieve a list of conditions for a specific edge
  parameters:
    - in: path
      name: edgeId
      required: true
      schema:
        $ref: '#/components/schemas/Guid'
  responses:
    '200':
      description: List of conditions retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Conditions'
    '404':
      description: Edge not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string