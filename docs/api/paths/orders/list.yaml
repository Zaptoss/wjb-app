post:
  tags:
    - Orders
  summary: Create order manually
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/CreateOrderRequest.yaml'
  responses:
    "200":
      description: Order created
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Order.yaml'
    "500":
      description: Internal Server Error

get:
  tags:
    - Orders
  summary: Get list of orders
  parameters:
  # pagination
  - name: Page
    in: query
    description: Page number from 1
    schema:
      type: integer
      minimum: 1
      example: 1
  - name: PageSize
    in: query
    description: Number of orders per page
    schema:
      type: integer
      minimum: 1
      example: 20
  #filters
  - name: From
    in: query
    description: Data creation (from)
    schema:
      type: string
      format: date-time
  - name: To
    in: query
    description: Data creation (to)
    schema:
      type: string
      format: date-time
  - name: MinTotal
    in: query
    description: Total amount (from)
    schema:
      type: number
  - name: SortBy
    in: query
    description: Sort column
    schema:
      type: string
      enum: [timestamp, subtotal, compositeRate, taxAmount, totalAmount, locationValid]
      default: timestamp
      example: totalAmount
  - name: SortDir
    in: query
    description: Sort direction
    schema:
      type: string
      enum: [asc, desc]
      default: desc
      example: asc
  responses:
    "200":
      description: List of orders
      content:
        application/json:
          schema:
            type: object
            required:
              - items
            properties:
              items:
                $ref: '../../components/schemas/Order.yaml'
    "204":
      description: No content — no matching data
    "500":
      description: Internal Server Error
