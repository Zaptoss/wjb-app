post:
  tags:
    - Auth
  summary: Perform authentication
  description: Obtain the user''s login and password to perform the authentication procedure
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/loginRequest.yaml
  security: []
  responses:
    "200":
      description: Logged in successfully
      headers:
        Set-Cookie:
          schema:
            type: string
            example: TaxAuth=abcde12345; Path=/; samesite=lax; HttpOnly
    "401":
      description: Invalid credentials
      content:
        text/plain:
          schema:
            type: string
    "500":
      description: Internal Server Error
