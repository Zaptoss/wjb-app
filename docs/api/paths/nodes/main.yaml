patch:
  tags:
    - Nodes
  summary: Update a specific node by its ID
  parameters:
    - in: path
      name: nodeId
      required: true
      schema:
        type: string
        example: "30dd879c-ee2f-11db-8314-0800200c9a66"
        pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Node'
