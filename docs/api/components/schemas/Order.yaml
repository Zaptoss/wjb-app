type: object
required:
  - id
  - compositeTaxRate
  - taxRateAmount
  - totalAmount
  - subTotal
  - longitude
  - latitude
  - isLocationValid
  - orderDate
  - stateRate
  - stateName
  - countyRate
  - countyName
  - cityRate
  - specialRate
properties:
  id:
    type: number
  compositeTaxRate:
    type: number
  taxRateAmount:
    type: number
  totalAmount:
    type: number
  subTotal:
    type: number
  longitude:
    type: number
  latitude:
    type: number
  isLocationValid:
    type: boolean
  orderDate:
    type: string
    format: data-time
  stateRate:
    type: number
  stateName:
    type: string
  countyRate:
    type: number
  cityName:
    type: string
  specialRate:
    type: number
  special:
    type: string
