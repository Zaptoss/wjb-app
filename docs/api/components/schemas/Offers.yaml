allOf:
  - $ref: ./OffersKey.yaml
  - type: object
    required:
      - attributes
    properties:
      attributes:
        type: object
        required:
          - name
          - description
          - createdAt
          - updatedAt
          - isActive
        properties:
          name:
            type: string
          description:
            type: string
          createdAt:
            type: string
            format: date-time
            readOnly: true
          updatedAt:
            type: string
            format: date-time
            readOnly: true
          isActive:
            type: boolean
