components:
  schemas:
    FlowsKey:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
          example: 30dd879c-ee2f-11db-8314-0800200c9a66
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          readOnly: true
        type:
          type: string
          enum:
            - flows
    Flows:
      allOf:
        - $ref: '#/components/schemas/FlowsKey'
        - type: object
          required:
            - attributes
          properties:
            attributes:
              type: object
              required:
                - title
                - description
                - isActive
                - createdAt
                - updatedAt
              properties:
                title:
                  type: string
                description:
                  type: string
                isActive:
                  type: boolean
                createdAt:
                  type: string
                  format: date-time
                  readOnly: true
                updatedAt:
                  type: string
                  format: date-time
                  readOnly: true
          relationships:
            nodes:
              type: array
              items:
                $ref: ./Nodes.yaml
            conditions:
              type: array
              items:
                $ref: ./Conditions.yaml
            offers:
              type: array
              items:
                $ref: ./Offers.yaml
            nodeOptions:
              type: array
              items:
                $ref: ./Options.yaml
    Flow:
      $ref: '#/components/schemas/Flows'
    NodesKey:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
          example: 30dd879c-ee2f-11db-8314-0800200c9a66
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          readOnly: true
        type:
          type: string
          enum:
            - nodes
    Nodes:
      allOf:
        - $ref: '#/components/schemas/NodesKey'
        - type: object
          required:
            - attributes
          properties:
            attributes:
              type: object
              required:
                - title
                - type
                - createdAt
                - updatedAt
              properties:
                title:
                  type: string
                description:
                  type: string
                type:
                  type: string
                inputType:
                  type: string
                attributeKey:
                  type: string
                createdAt:
                  type: string
                  format: date-time
                  readOnly: true
                updatedAt:
                  type: string
                  format: date-time
                  readOnly: true
          relationships:
            options:
              type: array
              items:
                $ref: ./Options.yaml
    Node:
      $ref: '#/components/schemas/Nodes'
    CreateNodeRequest:
      $ref: '#/components/schemas/Nodes'
    EdgesKey:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
          example: 30dd879c-ee2f-11db-8314-0800200c9a66
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          readOnly: true
        type:
          type: string
          enum:
            - edges
    Edges:
      allOf:
        - $ref: '#/components/schemas/EdgesKey'
        - type: object
          required:
            - attributes
          properties:
            attributes:
              type: object
              required:
                - priority
                - from
                - to
              properties:
                priority:
                  type: integer
                from:
                  type: string
                to:
                  type: string
            relationships:
              type: object
              required:
                - conditionGroups
              properties:
                conditionGroups:
                  type: object
                  required:
                    - data
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ConditionGroupsKey'
    Edge:
      $ref: '#/components/schemas/Edges'
    ConditionGroupsKey:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
          example: 30dd879c-ee2f-11db-8314-0800200c9a66
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          readOnly: true
        type:
          type: string
          enum:
            - condition-groups
    ConditionGroups:
      allOf:
        - $ref: '#/components/schemas/ConditionGroupsKey'
        - type: object
          required:
            - attributes
          properties:
            attributes:
              type: object
              required:
                - target
              properties:
                target:
                  type: string
                  enum:
                    - edge
                    - option
                    - offer
            relationships:
              type: object
              required:
                - conditions
              properties:
                conditions:
                  type: object
                  required:
                    - data
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ConditionsKey'
    ConditionGroup:
      $ref: '#/components/schemas/ConditionGroups'
    CreateConditionGroupRequest:
      $ref: '#/components/schemas/ConditionGroups'
    ConditionsKey:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
          example: 30dd879c-ee2f-11db-8314-0800200c9a66
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          readOnly: true
        type:
          type: string
          enum:
            - conditions
    Conditions:
      allOf:
        - $ref: '#/components/schemas/ConditionsKey'
        - type: object
          required:
            - attributes
          properties:
            attributes:
              type: object
              required:
                - target
                - operator
                - attributeKey
                - value
              properties:
                target:
                  type: string
                  enum:
                    - edge
                    - option
                    - offer
                operator:
                  type: string
                  enum:
                    - equals
                    - notEquals
                    - greaterThan
                    - lessThan
                    - in
                attributeKey:
                  type: string
                value:
                  type: string
    Condition:
      $ref: '#/components/schemas/Conditions'
    CreateConditionRequest:
      $ref: '#/components/schemas/Conditions'
    OffersKey:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
          example: 30dd879c-ee2f-11db-8314-0800200c9a66
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          readOnly: true
        type:
          type: string
          enum:
            - offers
    Offers:
      allOf:
        - $ref: '#/components/schemas/OffersKey'
        - type: object
          required:
            - attributes
          properties:
            attributes:
              type: object
              required:
                - name
                - description
                - createdAt
                - updatedAt
                - isActive
              properties:
                name:
                  type: string
                description:
                  type: string
                createdAt:
                  type: string
                  format: date-time
                  readOnly: true
                updatedAt:
                  type: string
                  format: date-time
                  readOnly: true
                isActive:
                  type: boolean
    Offer:
      $ref: '#/components/schemas/Offers'
    CreateOfferRequest:
      $ref: '#/components/schemas/Offers'
    OptionsKey:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
          example: 30dd879c-ee2f-11db-8314-0800200c9a66
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          readOnly: true
        type:
          type: string
          enum:
            - options
    Options:
      allOf:
        - $ref: '#/components/schemas/OptionsKey'
        - type: object
          required:
            - attributes
          properties:
            attributes:
              type: object
              required:
                - label
                - value
                - displayOrder
                - createdAt
                - updatedAt
              properties:
                label:
                  type: string
                value:
                  type: string
                displayOrder:
                  type: integer
                createdAt:
                  type: string
                  format: date-time
                  readOnly: true
                updatedAt:
                  type: string
                  format: date-time
                  readOnly: true
    Error:
      type: object
      properties:
        error:
          type: string
    Guid:
      type: string
      example: 30dd879c-ee2f-11db-8314-0800200c9a66
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: TaxAuth
