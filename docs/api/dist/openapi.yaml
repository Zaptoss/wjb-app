openapi: 3.1.0
info:
  title: Wellness Journey Builder API
  version: 1.0.0
  description: API for importing and managing delivery orders
servers:
  - url: https://wjb-api.brainybobs.xyz/
    description: Production server
security:
  - cookieAuth: []
paths:
  /api/v1/flows:
    post:
      tags:
        - Flows
      summary: Create a new flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  $ref: '#/components/schemas/Flows'
      responses:
        '201':
          description: Flow created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Flows'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    get:
      tags:
        - Flows
      summary: Retrieve a list of flows
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of items per page for pagination
      responses:
        '200':
          description: A list of flows retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Flows'
                  meta:
                    type: object
                    properties:
                      totalItems:
                        type: integer
                      totalPages:
                        type: integer
                      currentPage:
                        type: integer
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/v1/flows/{flowId}:
    get:
      tags:
        - Flows
      summary: Retrieve a specific flow by its ID
      parameters:
        - in: path
          name: flowId
          required: true
          schema:
            type: string
            example: 30dd879c-ee2f-11db-8314-0800200c9a66
            pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      responses:
        '200':
          description: Flow retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flow'
        '404':
          description: Flow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
