name: Build & Push Docker Images

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: int20h-2026
  GAR_LOCATION: europe-central2
  GAR_REPOSITORY: wjb

jobs:
  build_push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-admin
            context: api/WellnessBuilder
            dockerfile: Dockerfile.admin
            container: admin-backend
          - name: api-user
            context: api/WellnessBuilder
            dockerfile: Dockerfile.users
            container: user-backend
          - name: migration
            context: api/WellnessBuilder
            dockerfile: Dockerfile.migration
            container: migration-backend
          - name: web-admin
            context: web/admin-fe
            dockerfile: Dockerfile
            container: admin-frontend
          - name: web-user
            context: web/user-fe
            dockerfile: Dockerfile
            container: user-frontend
          - name: docs
            context: docs
            dockerfile: Dockerfile
            container: docs

    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth for GAR
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.name }}:${{ github.ref_name }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.name }}:${{ github.sha }}
